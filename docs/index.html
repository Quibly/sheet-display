
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      font-family: Montserrat, sans-serif;
      background: #ffffff;
    }

    .container {
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 16px;
    }

    .card {
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      padding: 16px;
      background: white;
    }

    .card h3 {
      margin: 0 0 8px;
      font-size: 16px;
    }

    .card p {
      margin: 0;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="grid">
      
        <div class="card">
          
            <p><strong>First Name:</strong> Adam</p>
          
            <p><strong>Last Name:</strong> D</p>
          
            <p><strong>Email Address:</strong> adam@gmail.com</p>
          
            <p><strong>Score:</strong> 50</p>
          
        </div>
      
        <div class="card">
          
            <p><strong>First Name:</strong> Josh</p>
          
            <p><strong>Last Name:</strong> Crossy</p>
          
            <p><strong>Email Address:</strong> josh@gmail.com</p>
          
            <p><strong>Score:</strong> 100</p>
          
        </div>
      
        <div class="card">
          
            <p><strong>First Name:</strong> Judy</p>
          
            <p><strong>Last Name:</strong> R</p>
          
            <p><strong>Email Address:</strong> judy@gmail.com</p>
          
            <p><strong>Score:</strong> 200</p>
          
        </div>
      
    </div>
  </div>
</body>
</html>
